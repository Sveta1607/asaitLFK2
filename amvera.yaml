# Этот блок создаётся, чтобы явно указать Docker-окружение сборки на Amvera.
meta:
  environment: docker
  toolchain:
    name: docker

# Этот блок создаётся, чтобы Amvera использовала именно backend Dockerfile,
# где устанавливаются зависимости включая PyJWT.
build:
  dockerfile: backend/Dockerfile

# Этот блок создаётся, чтобы маршрутизация Amvera шла на API-порт backend.
run:
  containerPort: 3000
