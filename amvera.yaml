---
# Этот файл создаётся, чтобы Amvera-проект фронтенда собирал контейнер с Nginx.
# Бэкенд (проект lfk-b) настраивается через UI Amvera — включая persistenceMount: /data.
meta:
  environment: docker
  toolchain:
    name: docker
    version: latest
build:
  dockerfile: Dockerfile.frontend
  skip: false
run:
  containerPort: 80
  servicePort: 80
