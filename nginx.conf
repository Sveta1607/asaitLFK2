# Этот блок создаётся, чтобы фронтенд-контейнер обслуживал SPA-статику отдельно.
# Прокси /api убирает кросс-доменные запросы браузера к бэкенду (нет CORS между поддоменами Amvera).
server {
    listen 80;
    server_name _;

    # Этот блок создаётся, чтобы Nginx отдавал собранные файлы из стандартной директории.
    root /usr/share/nginx/html;
    index index.html;

    # Этот блок создаётся, чтобы запросы с того же origin (…/api/…) шли на бэкенд Amvera.
    location /api/ {
        proxy_pass https://lfk-b-svetlanagolovchanskaya.amvera.io/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host lfk-b-svetlanagolovchanskaya.amvera.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Этот блок создаётся, чтобы поддерживать клиентский роутинг (React Router/Vue Router).
    location / {
        try_files $uri /index.html;
    }
}
