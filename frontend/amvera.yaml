# Этот блок создаётся, чтобы Amvera знала, что фронтенд собирается через Docker.
meta:
  environment: docker
  toolchain:
    name: docker

# Этот блок создаётся, чтобы Amvera нашла Dockerfile в корне папки frontend.
build:
  dockerfile: Dockerfile

# Этот блок создаётся, чтобы Amvera слушала порт 80 (Nginx внутри контейнера).
# В nginx добавлен GET /health (только «ok», без прокси на бэкенд).
# Если в панели Amvera в «пробах Kubernetes» указан путь вроде /api/... — замените на /health (порт 80).
run:
  containerPort: 80
