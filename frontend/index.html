<!doctype html>
<!-- index.html — корневой HTML-файл, куда Vite монтирует React-приложение -->
<html lang="ru">
  <head>
    <!-- meta-теги: кодировка и адаптивная вёрстка -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts: Nunito — округлый дружелюбный шрифт для детской тематики -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- title: название вкладки браузера -->
    <title>Детский ЛФК — запись на приём</title>

    <!-- Яндекс Метрика — счётчик аналитики посещаемости.
         Vite подставляет %VITE_YANDEX_METRIKA_ID% из .env при сборке.
         Если переменная пустая, скрипт пропускает инициализацию. -->
    <script>
      (function () {
        var id = '%VITE_YANDEX_METRIKA_ID%';
        if (!id || id.indexOf('VITE_') !== -1) return;

        (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
        m[i].l=1*new Date();
        for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
        k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
        (window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");

        ym(parseInt(id), "init", {
          clickmap: true,
          trackLinks: true,
          accurateTrackBounce: true,
          webvisor: true
        });
      })();
    </script>
  </head>
  <body class="bg-gradient-to-br from-mint-50 via-white to-warm-50">
    <!-- корневой контейнер для React-приложения -->
    <div id="root"></div>
    <!-- подключение входного модуля Vite/React -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
